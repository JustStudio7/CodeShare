<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeShare</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="https://juststudio.is-a.dev/js/navbar.js" defer=""></script>
    <style data-tag="reset-style-sheet">
      html {  line-height: 1.15;}body {  margin: 0;}* {  box-sizing: border-box;  border-width: 0;  border-style: solid;}p,li,ul,pre,div,h1,h2,h3,h4,h5,h6,figure,blockquote,figcaption {  margin: 0;  padding: 0;}button {  background-color: transparent;}button,input,optgroup,select,textarea {  font-family: inherit;  font-size: 100%;  line-height: 1.15;  margin: 0;}button,select {  text-transform: none;}button,[type="button"],[type="reset"],[type="submit"] {  -webkit-appearance: button;}button::-moz-focus-inner,[type="button"]::-moz-focus-inner,[type="reset"]::-moz-focus-inner,[type="submit"]::-moz-focus-inner {  border-style: none;  padding: 0;}button:-moz-focus,[type="button"]:-moz-focus,[type="reset"]:-moz-focus,[type="submit"]:-moz-focus {  outline: 1px dotted ButtonText;}a {  color: inherit;  text-decoration: inherit;}input {  padding: 2px 4px;}img {  display: block;}html { scroll-behavior: smooth  }
    </style>
    <style data-tag="default-style-sheet">
      html {
        font-family: Inter;
        font-size: 16px;
      }

      body {
        font-weight: 400;
        font-style:normal;
        text-decoration: none;
        text-transform: none;
        letter-spacing: normal;
        line-height: 1.15;
        color: var(--dl-color-theme-neutral-dark);
        padding-top: 90px;
        padding-left: 20px;
        fill: var(--dl-color-theme-neutral-dark);
      }
    </style>
    <script>
        if (!Clerk) {
            window.onload = function() {
                const Clerk = window.opener ? window.opener.clerk : null;
                if (!Clerk) {
                    window.open("https://juststudio.is-a.dev/account/?r=cs", "_blank");
                    window.close();
                }
            };
        }
    </script>
</head>
<body>
    <div id="accounts"></div>
    <div id="content">
        <script type="module" src="https://juststudio.is-a.dev/js/account.js" defer></script>
        <h1>CodeShare (WORK IN PROGRESS). <a href="https://juststudio.is-a.dev/">made by JustStudio.</a></h1>
        <textarea id="codeInput" placeholder="Write your code here..."></textarea>
        <div class="btns">
            <select class="button">
                <option value="c">C</option>
                <option value="c++">C++</option>
                <option value="c#">C#</option>
                <option value="css">CSS</option>
                <option value="go">GO</option>
                <option value="html">HTML</option>
                <option value="java">Java</option>
                <option value="js">JavaScript</option>
                <option value="json">JSON</option>
                <option value="lua">Lua</option>
                <option value="luau_roblox">Luau (Roblox)</option>
                <option value="python">Python</option>
                <option value="plain" selected>Plain Text</option>
                <option value="ts">TypeScript</option>
            </select>
            <button id="saveButton" class="button">Upload</button><button id="loadButton" class="button">Load</button>
        </div>
        <span id="output"></span>
        <script defer>
            const userId = 'yourUserId';
            const verification = 'test';
            const language = 'javascript';
            const name = 'My Code Snippet';
    
            document.getElementById('saveButton').addEventListener('click', () => {
                const code = document.getElementById('codeInput').value;
                fetch('https://api.juststudio.is-a.dev/cs/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        authorId: userId,
                        verification: primary_email_address_id,
                        code: code,
                        lang: language,
                        name: name
                    })
                })
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    console.log('Code saved:', data);
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            });
    
            document.getElementById('loadButton').addEventListener('click', () => {
                const id = prompt('Enter the code ID:');
                fetch(`https://api.juststudio.is-a.dev/cs/${id}`)
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    document.getElementById('output').innerHTML = data.code;
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            });
        </script>
        <a
          href="https://juststudio.is-a.dev/"
          rel="noreferrer noopener"
          class="h-logo-link"
        >
          <img src="https://juststudio.is-a.dev/img/logo-200h.png" alt="Logo" class="h-logo" />
        </a>
        <div class="header"></div>
        <script src="/js/code.js" defer></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.halo.min.js"></script>
        <script>
        VANTA.HALO({
          el: "#content",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00
        })
        </script>
    </div>
</body>
</html>
