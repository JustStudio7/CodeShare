<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeShare</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="https://juststudio.is-a.dev/js/navbar.js" defer=""></script>
</head>
<body>
    <script
      async
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_live_Y2xlcmsuanVzdHN0dWRpby5pcy1hLmRldiQ"
      src="https://clerk.juststudio.is-a.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
      type="text/javascript">
    </script>
    <div id="accounts"></div>
    <div id="content">
        <script type="module" src="https://juststudio.is-a.dev/js/account.js" defer></script>
        <h1>CodeShare (WORK IN PROGRESS). <a href="https://juststudio.is-a.dev/">made by JustStudio.</a></h1>
        <textarea id="codeInput" placeholder="Write your code here..."></textarea>
        <button id="saveButton" class="button">Save Code</button>
        <button id="loadButton" class="button">Load Code</button>
        <div id="output"></div>
        <script>
            const userId = 'yourUserId';
            const verification = 'test';
            const language = 'javascript';
            const name = 'My Code Snippet';
    
            document.getElementById('saveButton').addEventListener('click', () => {
                const code = document.getElementById('codeInput').value;
                fetch('https://api.juststudio.is-a.dev/cs/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        authorId: userId,
                        verification: primary_email_address_id,
                        code: code,
                        lang: language,
                        name: name
                    })
                })
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    console.log('Code saved:', data);
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            });
    
            document.getElementById('loadButton').addEventListener('click', () => {
                const id = prompt('Enter the code ID:');
                fetch(`https://api.juststudio.is-a.dev/cs/${id}`)
                .then(response => {
                    return response.json();
                })
                .then(data => {
                    document.getElementById('output').innerHTML = data.code;
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            });
        </script>
        <div class="header"></div>
    </div>
</body>
</html>
